<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gun Merge</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Roboto:wght@900&display=swap" rel="stylesheet">
    <style>
        /* --- RESET & BASE --- */
        :root {
            --bg-blue: #1e29eb;
            --dark-panel: #3a3a3a;
            --topbar-gray: #4a4a4a;
            --coin-yellow: #f1c40f;
            --buy-green: #5cdb2d;
            --progress-blue: #00a2ff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            height: 100%;
            width: 100%;
            overflow: hidden; /* Empêche tout scroll */
            background-color: var(--bg-blue);
            font-family: 'Roboto', sans-serif;
        }

        /* --- LAYOUT PRINCIPAL --- */
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 12px;
            gap: 12px;
        }

        /* --- TOPBAR GRISE ARROUNDIE --- */
        .topbar {
            background-color: var(--topbar-gray);
            height: 65px;
            border-radius: 15px; /* Coins arrondis selon ta demande */
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            flex-shrink: 0; /* Empêche la topbar de s'écraser */
        }

        .level-section {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .level-circle {
            background: var(--progress-blue);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 1.2rem;
            border: 3px solid #007acc;
        }

        .exp-bar-bg {
            width: 70px;
            height: 20px;
            background: #333;
            border-radius: 4px;
            overflow: hidden;
        }

        .exp-fill {
            width: 65%;
            height: 100%;
            background: var(--progress-blue);
        }

        .game-logo {
            color: white;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            letter-spacing: 1px;
        }

        .money-section {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .money-amount {
            color: white;
            font-size: 1.4rem;
            font-style: italic;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .money-amount span { color: var(--coin-yellow); }

        .income-text {
            color: #aaa;
            font-size: 0.75rem;
            font-weight: normal;
        }

        /* --- GRILLE DE JEU --- */
        /* --- MISE À JOUR DE LA GRILLE --- */
/* --- GRILLE DE JEU ADAPTATIVE --- */
.main-grid {
    flex-grow: 1;
    background-color: var(--dark-panel);
    border-radius: 15px;
    display: grid;
    padding: 20px;
    gap: 10px;
    
    /* Par défaut (PC) : 8 colonnes */
    grid-template-columns: repeat(8, 1fr); 
    align-content: start;
    
    /* Gestion du scroll pour ne pas gêner le bouton buy */
    overflow-y: auto;
    max-height: 100%;
}

/* Style de la scrollbar personnalisée */
.main-grid::-webkit-scrollbar {
    width: 8px;
}
.main-grid::-webkit-scrollbar-track {
    background: rgba(0, 0, 0, 0.2);
    border-radius: 10px;
}
.main-grid::-webkit-scrollbar-thumb {
    background: var(--progress-blue);
    border-radius: 10px;
}

/* --- RESPONSIVE MOBILE --- */
@media (max-width: 1024px) {
    .game-logo { display: none; }
    
    .main-grid {
        /* Mobile : 3 colonnes */
        grid-template-columns: repeat(3, 1fr);
    }

    .footer {
        justify-content: center;
        padding-bottom: 10px;
    }

    .btn-buy {
        width: 90%;
    }
}

        .slot {
            aspect-ratio: 1/1;
            display: flex;
            justify-content: center;
            align-items: center;
            color: rgba(255,255,255,0.5);
            font-size: 2rem;
            font-weight: 100;
        }

        /* --- BOUTON BUY --- */
        .footer {
            height: 100px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            flex-shrink: 0;
        }

        .btn-buy {
            background-color: var(--buy-green);
            border: none;
            border-radius: 50px;
            padding: 10px 45px;
            color: white;
            cursor: pointer;
            box-shadow: 0 6px 0px #3d8f1e;
            transition: 0.1s;
        }

        .btn-buy:active {
            transform: translateY(3px);
            box-shadow: 0 3px 0px #3d8f1e;
        }

        .btn-buy .label { font-size: 2rem; display: block; line-height: 1; }
        .btn-buy .price { font-size: 1rem; opacity: 0.9; }

        /* --- RESPONSIVE MOBILE --- */
        @media (max-width: 1024px) {
            .game-logo { display: none; } /* On cache le titre sur mobile */
            
            .main-grid {
                grid-template-columns: repeat(3, 1fr);
                grid-template-rows: repeat(5, 1fr);
            }

            .footer {
                justify-content: center;
                padding-bottom: 10px;
            }

            .btn-buy {
                width: 90%;
            }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header class="topbar">
            <div class="level-section">
                <div class="level-circle">7</div>
                <div class="exp-bar-bg"><div class="exp-fill"></div></div>
            </div>

            <div class="game-logo">GUN MERGE</div>

            <div class="money-section">
                <div class="money-amount"><span>$</span> 1000</div>
                <div class="income-text">00/sec</div>
            </div>
        </header>

        <main class="main-grid" id="grid">
            </main>

        <footer class="footer">
            <button class="btn-buy" style="position: sticky">
                <span class="label">buy</span>
                <span class="price">$500</span>
            </button>
        </footer>
    </div>

    <script>
        const grid = document.getElementById('grid');
        // On crée 15 slots pour remplir la grille 3x5 du mobile
        for (let i = 0; i < 15; i++) {
            const div = document.createElement('div');
            div.className = 'slot';
            div.textContent = '+';
            grid.appendChild(div);
        }
    </script>
    <script src="script_merge_gun.js"></script>
<script src="../script/script_inspecter.js"></script>
</body>
</html>
