<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="../../Image/Apple_Image_Merge_Gun.png">
    <title>Accès Sécurisé</title>
    <style>
        :root {
            --accent: #2478cd; /* Bleu iOS Dark */
            --bg: #ffffff;
            --card: #ffffff;
            --input: #ffffff;
            --text: black;
        }

        /* --- CONTRAINTES MOBILE --- */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            overflow: hidden; /* Aucune barre de scroll */
            background-color: var(--bg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Affichage seulement sur mobile (simulé ou réel) */
        .container {
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- LOGO / TITRE --- */
        .shield-icon {
            font-size: 50px;
            color: var(--accent);
            margin-bottom: 20px;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        p.subtitle {
            color: #8e8e93;
            font-size: 14px;
            margin-bottom: 40px;
            text-align: center;
        }

        /* --- FORMULAIRE --- */
        .form-group {
            width: 100%;
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            background: var(--input);
            border: 1px solid #3a3a3c;
            border-radius: 12px;
            padding: 16px;
            color: rgb(0, 0, 0);
            font-size: 16px; /* Évite le zoom auto iOS */
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--accent);
        }

        .btn-login {
            width: 100%;
            background: var(--accent);
            color: rgb(0, 0, 0);
            border: none;
            border-radius: 12px;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: opacity 0.2s;
        }

        .btn-login:active {
            opacity: 0.7;
        }

        /* --- CHARGEMENT --- */
        .loader-screen {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        .hidden { display: none !important; }

    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div id="checkSession" class="loader-screen">
        <div class="spinner"></div>
        <p style="font-size: 14px; color: #8e8e93;">Chargement..</p>
    </div>

    <div class="container hidden" id="loginUI">
        <div class="shield-icon">
            <image src="../../Image/Apple_Image_Merge_Gun.png" width="50" height="50"></image>
        </div>
        <h1>Connexion a votre Compte</h1>
        <p class="subtitle">Ceci est un ecran de Connexion menant vers le jeu Gun Merge. Veuillez y renseigner votre compte pour pouvoir y accéder.</p>

        <form id="authForm" style="width: 100%;">
            <div class="form-group">
                <input type="text" id="userField" placeholder="Identifiant" required spellcheck="false">
            </div>
            <div class="form-group">
                <input type="password" id="passField" placeholder="Mot de passe" required>
            </div>
            <button type="submit" class="btn-login">Continuer</button>
        </form>
    </div>

    <script>
        // Détection mobile simple
        if (!/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)) {
            alert("Cet accès est réservé exclusivement aux appareils mobiles.");
            
            if (document.referrer) {
                window.history.back(); // Retourne à la page précédente
            } else {
                window.location.href = "https://www.google.com"; // Redirection de secours si pas d'historique
            }
        }
        const DESTINATION = "Base_Merge_Gun.html";
        const API_LOGIN = "https://project-3-api-2bgb.onrender.com/login";

        const checkScreen = document.getElementById('checkSession');
        const loginUI = document.getElementById('loginUI');
        const authForm = document.getElementById('authForm');

        // 1. Logique Auto-Connexion
        window.onload = function() {
            const savedUser = localStorage.getItem("username");
            
            if (savedUser) {
                // Si déjà stocké, on saute l'étape de login
                window.location.replace(DESTINATION);
            } else {
                // Sinon, on affiche le formulaire après un court délai pour le style
                setTimeout(() => {
                    checkScreen.classList.add('hidden');
                    loginUI.classList.remove('hidden');
                }, 800);
            }
        };

        // 2. Traitement du Formulaire
        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('userField').value.trim();
            const password = document.getElementById('passField').value.trim();

            // Affichage du loader pendant l'appel API
            checkScreen.classList.remove('hidden');
            loginUI.classList.add('hidden');

            try {
                const response = await fetch(API_LOGIN, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ id: username, password: password })
                });

                const result = await response.json();

                if (result.status === "success") {
                    // Stockage et Redirection
                    localStorage.setItem("username", username);
                    window.location.href = DESTINATION;
                } else {
                    // Erreur : Retour au formulaire
                    alert("Accès refusé : Identifiants incorrects.");
                    checkScreen.classList.add('hidden');
                    loginUI.classList.remove('hidden');
                }
            } catch (error) {
                alert("Erreur de connexion au serveur.");
                checkScreen.classList.add('hidden');
                loginUI.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
